<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../src/output.css" />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <title>Login</title>
  </head>

  <body class="bg-zinc-50 min-h-screen flex flex-col">
    <!-- contenedor donde el archivo js de aaron va a meter el navbar -->
    <div
      id="navbar"
      class="fixed top-0 right-0 left-0 h-16 px-4 border border-gray-300 bg-white shadow-md"
    ></div>

    <!-- contenedor principal que centra todo en la pantalla -->
    <div
      class="pt-16 pb-10 px-4 sm:px-8 min-h-screen flex flex-col md:flex-row max-w-7xl mx-auto justify-center items-center gap-10"
    >
      <!-- contenedor de la imagen izquierda solo para pantallas grandes -->
      <div class="hidden md:flex max-w-xs w-3/4 justify-center items-center">
        <img class="w-full" src="/images/login-icon.png" alt="login-icon" />
      </div>

      <!-- formulario de login -->
      <form
        id="form"
        class="flex flex-col gap-4 bg-white p-8 rounded-lg shadow-md w-full max-w-md"
      >
        <h2 class="text-2xl font-bold text-center text-zinc-800">Sign In</h2>

        <!-- contenedor del input de correo -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-zinc-600"
            >Email Address</label
          >
          <input
            type="email"
            id="email"
            required
            class="border border-zinc-300 p-2 rounded-lg focus:outline-none focus:border-indigo-500"
            placeholder="your@email.com"
          />
        </div>

        <!-- contenedor del input de contraseña -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-zinc-600">Password</label>
          <input
            type="password"
            id="password"
            required
            class="border border-zinc-300 p-2 rounded-lg focus:outline-none focus:border-indigo-500"
            placeholder="••••••••"
          />
          <p id="error-text" class="text-sm text-red-600"></p>
        </div>

        <!-- boton para iniciar sesion -->
        <button
          id="form-btn"
          class="bg-indigo-700 py-2 px-4 rounded-lg font-bold text-white hover:bg-indigo-800 transition-colors mt-2"
        >
          Login
        </button>
      </form>
    </div>

    <!-- script para cargar la barra de navegacion automatica de aaron -->
    <script src="index.js"></script>
    <script src="/components/navbar.js"></script>
  </body>
</html>
