<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="../../src/output.css" />
</head>

<body class="bg-zinc-50 h-screen">
    <nav id="navbar"></nav>
    <div id="notification" class="fixed top-20 right-0 left-0"></div>   
    <div class="flex pt-16 h-full max-w-7xl mx-auto justify-center items-center px-4">
        <form id="form" class="flex pt-16 flex-col gap-4 bg-zinc-200 p-4 rounded-lg text-lg shadow-lg lg:w-2/4">
            <div class="flex flex-col gap-2">
                <label class="font-bold" for="name-input">Name <span class="text-red-500">*</span></label>
                <input id="name-input" type="text" name="name-input" autocomplete="off" placeholder="Enter your name" class="rounded-lg p-2 bg-zinc-100 focus:outline-blue-500"/>
                <p class="text-sm etxt-zinc-800">
                    Name must contain at least 4 letters
                </p>
            </div>
            <div class="flex flex-col gap-2">
                <label class="font-bold" for="email-input">Email <span class="text-red-500">*</span></label>
                <input id="email-input" type="text" name="email-input" autocomplete="off" placeholder="example@gmail.com" class="rounded-lg p-2 bg-zinc-100 focus:outline-blue-500"/>
                <p class="text-sm etxt-zinc-800">Valid email is required</p>
            </div>
            <div class="flex flex-col gap-2">
                <label class="font-bold" for="password-input">Password <span class="text-red-500">*</span></label>
                <input id="password-input" type="password" name="password-input" autocomplete="off" placeholder="Enter your password" class="rounded-lg p-2 bg-zinc-100 focus:outline-blue-500"/>
                <p class="text-sm etxt-zinc-800">
                    Must contain at least one letter<br/>
                    Must contain at least one number<br/>
                    Must be at least 8 characters long
                </p>
            </div>
            <div class="flex flex-col gap-2">
                <label class="font-bold" for="password-input">Confirm password<span class="text-red-500">*</span></label>
                <input id="match-input" type="password" name="match-input" autocomplete="off" placeholder="Enter same password" class="rounded-lg p-2 bg-zinc-100 focus:outline-blue-500"/>
                <p class="text-sm etxt-zinc-800">Passwords must match</p>
            </div>
            <button id="form-btn" class="bg-blue-700 py-2 px-4 rounded-lg font-bold text-white hover:bg-blue-800 text-center transition ease-in-out disabled:opacity-40 disabled:cursor-not-allowed" disabled>
                Sign up
            </button>
        </form>
    </div>
    <script src="/views/components/navbar.js"></script>
    <script src="./index.js"></script>
</body>

</html>
